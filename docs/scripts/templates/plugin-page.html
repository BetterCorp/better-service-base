<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{plugin.package}} - BSB Plugins</title>

  <!-- Favicons -->
  <link rel="icon" type="image/x-icon" href="/assets/images/favicon.ico">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/images/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/images/favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/images/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#fb8c00">

  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1/themes/prism-tomorrow.min.css">
  <style>
    .page-header { background: linear-gradient(135deg, var(--bg-secondary), var(--bg-color)); padding: 3rem 2rem; border-bottom: 1px solid var(--border-color); border-top: 4px solid var(--logging-color); }
    .page-header h1 { font-size: 2rem; margin-bottom: 0.5rem; font-family: 'Monaco', 'Menlo', monospace; }
    .page-header p { color: var(--text-secondary); font-size: 1.125rem; margin-bottom: 1.5rem; }

    /* Hero metadata - clean inline style */
    .hero-badges { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 1.5rem; justify-content: center; align-items: center; font-size: 0.875rem; color: var(--text-secondary); }
    .hero-badge { display: inline-flex; align-items: center; gap: 0.375rem; }
    .hero-badge-version { color: var(--success-color); }
    .hero-badge-official { color: var(--primary-color); }
    .hero-badge-lang { color: var(--text-color); }
    .hero-badge:not(:last-child)::after { content: '•'; margin-left: 0.75rem; color: var(--border-color); }

    /* Action links (npm, GitHub) */
    .action-links { display: flex; gap: 0.75rem; flex-wrap: wrap; justify-content: center; }
    .action-link { display: inline-flex; align-items: center; gap: 0.375rem; padding: 0.5rem 0.875rem; border-radius: 0.375rem; font-size: 0.8125rem; font-weight: 500; text-decoration: none; transition: all 0.2s; }
    .action-link svg:first-child { width: 14px; height: 14px; }
    .action-link-npm { background: rgba(203, 56, 55, 0.15); color: #cb3837; border: 1px solid rgba(203, 56, 55, 0.3); }
    .action-link-npm:hover { background: rgba(203, 56, 55, 0.25); border-color: #cb3837; }
    .action-link-github { background: rgba(100, 100, 100, 0.15); color: var(--text-color); border: 1px solid var(--border-color); }
    .action-link-github:hover { background: rgba(100, 100, 100, 0.25); border-color: var(--text-secondary); }
    .content-section { padding: 2rem; max-width: 900px; }

    /* Plugin tags in documentation area */
    .plugin-tags-section { margin-bottom: 2rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border-color); }
    .plugin-tags-section .section-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-secondary); margin-bottom: 0.75rem; font-weight: 600; }
    .plugin-tags { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .plugin-tag { padding: 0.375rem 0.75rem; background: var(--code-bg); border: 1px solid var(--border-color); border-radius: 0.375rem; font-size: 0.8125rem; color: var(--text-secondary); transition: all 0.2s; }
    .plugin-tag:hover { border-color: var(--primary-color); color: var(--primary-color); }

    /* Content visibility - default to showing single content */
    .single-content { display: block; }
    .tabs { display: none; }
    body[data-mode="tabs"] .single-content { display: none; }
    body[data-mode="tabs"] .tabs { display: block; }
    .content-section h2 { font-size: 1.5rem; color: var(--primary-color); margin: 2rem 0 1rem; }
    .content-section h3 { font-size: 1.125rem; margin: 1.5rem 0 0.75rem; }
    .content-section p { color: var(--text-secondary); line-height: 1.8; margin-bottom: 1rem; }
    .content-section ul { color: var(--text-secondary); }
    pre { background: var(--code-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 1.5rem; overflow-x: auto; margin: 1rem 0; }
    code { font-family: 'Monaco', 'Menlo', 'Consolas', monospace; font-size: 0.875rem; }
    .feature-list { list-style: none; padding: 0; }
    .feature-list li { padding: 0.5rem 0; padding-left: 1.5rem; position: relative; }
    .feature-list li:before { content: "✓"; position: absolute; left: 0; color: var(--success-color); font-weight: bold; }
    .tabs { margin: 2rem 0; }
    .tab-list { display: flex; gap: 0.5rem; border-bottom: 2px solid var(--border-color); list-style: none; padding: 0; margin: 0; }
    .tab { padding: 0.75rem 1.5rem; cursor: pointer; background: transparent; border: none; font-size: 1rem; color: var(--text-secondary); transition: all 0.2s; border-bottom: 2px solid transparent; margin-bottom: -2px; }
    .tab:hover { color: var(--primary-color); }
    .tab.active { color: var(--primary-color); border-bottom-color: var(--primary-color); font-weight: 500; }
    .tab-content { display: none; padding: 2rem 0; }
    .tab-content.active { display: block; }
    .info-box { background: rgba(59, 130, 246, 0.1); border-left: 4px solid var(--primary-color); padding: 1rem 1.5rem; margin: 1rem 0; border-radius: 0.5rem; }
    .info-box h4 { margin-top: 0; color: var(--primary-color); }
    .level-table { width: 100%; border-collapse: collapse; margin: 1rem 0; }
    .level-table th, .level-table td { padding: 0.75rem 1rem; text-align: left; border-bottom: 1px solid var(--border-color); }
    .level-table th { color: var(--primary-color); font-weight: 600; }
    .level-table td { color: var(--text-secondary); }
    .level-table code { background: var(--code-bg); padding: 0.125rem 0.375rem; border-radius: 3px; }
  </style>
</head>
<body>

    <div class="nav-container">
      <a href="/" class="nav-brand"><span class="brand-text">BSB</span></a>
      <nav class="nav-menu" id="nav-menu">

        <div class="nav-dropdown"><button class="nav-link">Extend BSB <span class="dropdown-arrow">&#9662;</span></button><div class="dropdown-content"><a href="/extending/nodejs/">Node.js</a><span class="coming-soon">Go</span><span class="coming-soon">Python</span></div></div>
        <div class="nav-dropdown"><button class="nav-link">Core Plugins <span class="dropdown-arrow">&#9662;</span></button><div class="dropdown-content"><a href="/core-plugins/">Overview</a><div class="dropdown-divider"></div><a href="/core-plugins/config-default/">config-default</a><a href="/core-plugins/events-default/">events-default</a><a href="/core-plugins/logging-default/">logging-default</a></div></div>
        <a href="/marketplace/" class="nav-link">Plugins</a><div class="nav-dropdown"><button class="nav-link">API Reference <span class="dropdown-arrow">&#9662;</span></button><div class="dropdown-content"><a href="/languages/nodejs/types/">Node.js</a><span class="coming-soon">Go</span><span class="coming-soon">Python</span><span class="coming-soon">Rust</span></div></div>
        <a href="https://github.com/BetterCorp/better-service-base" class="nav-link nav-external" target="_blank" rel="noopener">
          GitHub
          <svg class="external-link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>

      </nav>
      <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation"><span></span><span></span><span></span></button>
    </div>
  </header>
  <div class="doc-layout">
    <main class="main-content">
      <header class="page-header">
        <h1>{{plugin.package}}</h1>
        <p>{{plugin.description}}</p>

        <!-- Hero badges: languages, official, version -->
        <div class="hero-badges">
          {{HERO_BADGES}}
        </div>

        <!-- Action links: npm, GitHub -->
        <div class="action-links">
          <a href="{{plugin.links.npm}}" class="action-link action-link-npm" target="_blank" rel="noopener">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M0 7.334v8h6.666v1.332H12v-1.332h12v-8H0zm6.666 6.664H5.334v-4H3.999v4H1.335V8.667h5.331v5.331zm4 0v1.336H8.001V8.667h5.334v5.332h-2.669v-.001zm12.001 0h-1.33v-4h-1.336v4h-1.335v-4h-1.33v4h-2.671V8.667h8.002v5.331zM10.665 10H12v2.667h-1.335V10z"/></svg>
            npm
            <svg class="external-link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
              <polyline points="15 3 21 3 21 9"></polyline>
              <line x1="10" y1="14" x2="21" y2="3"></line>

            GitHub
            <svg class="external-link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
              <polyline points="15 3 21 3 21 9"></polyline>
              <line x1="10" y1="14" x2="21" y2="3"></line>

        </div>
      </header>
      <div class="content-section">
        <!-- Plugin tags -->
        <div class="plugin-tags-section">
          {{PLUGIN_TAGS}}
        </div>

        <!-- Single language mode: no tabs -->
        <div class="single-content">
          {{SINGLE_CONTENT}}
        </div>

        <!-- Multi-language or service-proxy mode: with tabs -->
        <div class="tabs">
          <ul class="tab-list">
            {{TABS_HTML}}
          </ul>
          {{TABS_CONTENT_HTML}}
        </div>
      </div>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-core.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/plugins/autoloader/prism-autoloader.min.js"></script>
  <script type="module" src="/assets/js/navbar.js"></script>
  <script>
    // Determine content mode and show appropriate container
    const contentMode = '{{CONTENT_MODE}}';

    // Set mode on body for CSS to handle visibility
    if (contentMode !== 'single') {
      document.body.setAttribute('data-mode', 'tabs');
    }

    function showTab(tabName) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      const targetTab = document.querySelector(`.tab[onclick*="${tabName}"]`);
      const targetContent = document.getElementById(tabName);
      if (targetTab) targetTab.classList.add('active');
      if (targetContent) targetContent.classList.add('active');
    }
  </script>
</body>
</html>
