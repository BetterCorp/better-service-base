name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORGEJO_REGISTRY: code.bettercorp.dev
  FORGEJO_SERVICE_BASE_IMAGE: code.bettercorp.dev/bettercorp/service-base
  FORGEJO_NODE_BASE_IMAGE: code.bettercorp.dev/bettercorp/docker-node:26
  NPM_CONFIG_AUDIT: "false"
  NPM_CONFIG_FUND: "false"
  NPM_CONFIG_PROGRESS: "false"
  NPM_CONFIG_UPDATE_NOTIFIER: "false"
  NPM_CONFIG_YES: "true"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare
    runs-on: blacksmith-4vcpu-ubuntu-2404
    outputs:
      version: ${{ steps.version.outputs.version }}
      npm-tag: ${{ steps.version.outputs.npm-tag }}
    steps:
      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=${TAG}" >> "$GITHUB_OUTPUT"
          if [[ "${TAG}" == *"-"* ]]; then
            PRE="${TAG#*-}"
            PRE="${PRE%%.*}"
            echo "npm-tag=${PRE}" >> "$GITHUB_OUTPUT"
          else
            echo "npm-tag=latest" >> "$GITHUB_OUTPUT"
          fi

  nodejs:
    name: Node.js
    needs: [prepare]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --workspace nodejs

      - name: Test
        run: npm run test --workspace nodejs

      - name: Set version
        working-directory: nodejs
        run: npm version ${{ needs.prepare.outputs.version }} --allow-same-version --no-git-tag-version

      - name: Upload package artifact
        uses: actions/upload-artifact@v5
        with:
          name: nodejs-package
          path: |
            nodejs
            !nodejs/node_modules
            !nodejs/src
            !nodejs/junit.json

  nodejs-publish:
    name: Node.js Publish
    needs: [nodejs, prepare]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Download package artifact
        uses: actions/download-artifact@v6
        with:
          name: nodejs-package
          path: nodejs

      - name: Publish to npm
        working-directory: nodejs
        run: |
          if npm view "@bsb/base@${{ needs.prepare.outputs.version }}" version --registry https://registry.npmjs.org >/dev/null 2>&1; then
            echo "@bsb/base@${{ needs.prepare.outputs.version }} is already published; skipping npm publish"
          else
            npm publish --tag ${{ needs.prepare.outputs.npm-tag }} --access public --provenance
          fi

  nodejs-tests:
    name: Node.js Tests Package
    needs: [nodejs, prepare]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build base
        run: npm run build-release --workspace nodejs

      - name: Build
        run: npm run build --workspace tests/nodejs

      - name: Set version
        working-directory: tests/nodejs
        run: npm version ${{ needs.prepare.outputs.version }} --allow-same-version --no-git-tag-version

      - name: Upload package artifact
        uses: actions/upload-artifact@v5
        with:
          name: nodejs-tests-package
          path: |
            tests/nodejs
            !tests/nodejs/node_modules
            !tests/nodejs/src

  nodejs-tests-publish:
    name: Node.js Tests Package Publish
    needs: [nodejs-tests, prepare]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Download package artifact
        uses: actions/download-artifact@v6
        with:
          name: nodejs-tests-package
          path: tests/nodejs

      - name: Publish to npm
        working-directory: tests/nodejs
        run: |
          if npm view "@bsb/tests@${{ needs.prepare.outputs.version }}" version --registry https://registry.npmjs.org >/dev/null 2>&1; then
            echo "@bsb/tests@${{ needs.prepare.outputs.version }} is already published; skipping npm publish"
          else
            npm publish --tag ${{ needs.prepare.outputs.npm-tag }} --access public --provenance
          fi

  nodejs-plugin-list:
    name: Node.js Plugin List
    needs: [prepare]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    outputs:
      matrix: ${{ steps.plugins.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Find public plugin packages
        id: plugins
        run: |
          node <<'NODE' > /tmp/nodejs-plugin-matrix.json
          const fs = require('node:fs');
          const path = require('node:path');
          const root = path.join(process.cwd(), 'plugins', 'nodejs');
          const include = fs.readdirSync(root, { withFileTypes: true })
            .filter((entry) => entry.isDirectory())
            .map((entry) => {
              const dir = path.join('plugins', 'nodejs', entry.name);
              const packagePath = path.join(process.cwd(), dir, 'package.json');
              if (!fs.existsSync(packagePath)) return null;
              const pkg = JSON.parse(fs.readFileSync(packagePath, 'utf8'));
              if (pkg.private === true) return null;
              const artifact = `nodejs-plugin-${pkg.name.replace(/^@/, '').replace(/[^a-zA-Z0-9._-]+/g, '-')}`;
              return { workspace: dir, name: pkg.name, artifact };
            })
            .filter(Boolean);
          console.log(JSON.stringify({ include }));
          NODE
          {
            echo 'matrix<<EOF'
            cat /tmp/nodejs-plugin-matrix.json
            echo EOF
          } >> "$GITHUB_OUTPUT"

  nodejs-plugins:
    name: Node.js Plugin ${{ matrix.name }}
    needs: [nodejs, nodejs-plugin-list, prepare]
    if: ${{ fromJson(needs.nodejs-plugin-list.outputs.matrix).include[0] != null }}
    runs-on: blacksmith-4vcpu-ubuntu-2404
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.nodejs-plugin-list.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Sync workspace versions
        run: npm run ws:version -- ${{ needs.prepare.outputs.version }}

      - name: Build base CLI
        run: npm run build-release --workspace nodejs

      - name: Link workspace bins
        run: |
          chmod +x nodejs/lib/cli.js nodejs/lib/scripts/bsb-plugin-cli.js nodejs/lib/scripts/bsb-client-cli.js
          for bin in bsb:lib/cli.js bsb-plugin-cli:lib/scripts/bsb-plugin-cli.js bsb-client-cli:lib/scripts/bsb-client-cli.js; do
            name="${bin%%:*}"
            target="../../nodejs/${bin#*:}"
            ln -sf "$target" "node_modules/.bin/$name"
          done

      - name: Set plugin version
        run: npm version ${{ needs.prepare.outputs.version }} --workspace "${{ matrix.workspace }}" --allow-same-version --no-git-tag-version

      - name: Build plugin
        run: npm run build --workspace "${{ matrix.workspace }}"

      - name: Upload package artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.workspace }}
            !${{ matrix.workspace }}/node_modules
            !${{ matrix.workspace }}/src

  nodejs-plugin-publish:
    name: Node.js Plugin Publish ${{ matrix.name }}
    needs: [nodejs, nodejs-plugin-list, nodejs-plugins, prepare]
    if: ${{ fromJson(needs.nodejs-plugin-list.outputs.matrix).include[0] != null }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.nodejs-plugin-list.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Download base package artifact
        uses: actions/download-artifact@v6
        with:
          name: nodejs-package
          path: nodejs

      - name: Download plugin package artifact
        uses: actions/download-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.workspace }}

      - name: Link workspace bins
        run: |
          chmod +x nodejs/lib/cli.js nodejs/lib/scripts/bsb-plugin-cli.js nodejs/lib/scripts/bsb-client-cli.js
          for bin in bsb:lib/cli.js bsb-plugin-cli:lib/scripts/bsb-plugin-cli.js bsb-client-cli:lib/scripts/bsb-client-cli.js; do
            name="${bin%%:*}"
            target="../../nodejs/${bin#*:}"
            ln -sf "$target" "node_modules/.bin/$name"
          done

      - name: Publish plugin to npm
        run: |
          if npm view "${{ matrix.name }}@${{ needs.prepare.outputs.version }}" version --registry https://registry.npmjs.org >/dev/null 2>&1; then
            echo "${{ matrix.name }}@${{ needs.prepare.outputs.version }} is already published; skipping npm publish"
          else
            npm publish --workspace "${{ matrix.workspace }}" --tag "${{ needs.prepare.outputs.npm-tag }}" --access public --provenance
          fi

      - name: Publish plugin to BSB registry
        env:
          BSB_REGISTRY_TOKEN: ${{ secrets.BSB_REGISTRY_TOKEN }}
        run: npm run publish:client --workspace "${{ matrix.workspace }}"

  registry-core-plugins:
    name: Publish Core BSB Registry Plugins
    needs: [nodejs, prepare]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Download package artifact
        uses: actions/download-artifact@v6
        with:
          name: nodejs-package
          path: nodejs

      - name: Publish core plugins to BSB registry
        working-directory: nodejs
        env:
          BSB_REGISTRY_TOKEN: ${{ secrets.BSB_REGISTRY_TOKEN }}
        run: npm run publish:client

  python:
    name: Python
    needs: [prepare]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    defaults:
      run:
        working-directory: python
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip build
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: pytest

      - name: Build package
        run: python -m build

  go:
    name: Go
    needs: [prepare]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    defaults:
      run:
        working-directory: go
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.1"
          cache-dependency-path: go/go.sum

      - name: Run tests
        run: go test ./...

      - name: Build CLI
        run: go build -o /tmp/bsb ./cmd/bsb

  dotnet:
    name: .NET
    needs: [prepare]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    defaults:
      run:
        working-directory: dotnet
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore BSB.sln

      - name: Build
        run: dotnet build BSB.sln --configuration Release --no-restore

  docker-nodejs:
    name: Docker Node.js
    needs: [nodejs-publish, nodejs-plugin-publish, prepare]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Resolve upstream platforms
        id: upstream
        run: |
          MANIFEST=$(curl -fsSL https://github.com/BetterCorp/docker-node/releases/latest/download/manifest.json)
          PLATFORMS=$(echo "$MANIFEST" | jq -r '(.builds[] | select(.major == 24) | .variants.base.platforms | join(",")) // empty')
          if [ -z "$PLATFORMS" ]; then
            PLATFORMS="linux/amd64,linux/arm64"
          fi
          echo "platforms=${PLATFORMS}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Compute tags
        id: tags
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          NPM_TAG="${{ needs.prepare.outputs.npm-tag }}"
          DOCKERHUB_TAGS="betterweb/service-base:node-${VERSION}"
          DOCKERHUB_TAGS="${DOCKERHUB_TAGS},betterweb/service-base:node-${NPM_TAG}"
          FORGEJO_TAGS="${FORGEJO_SERVICE_BASE_IMAGE}:node-${VERSION}"
          FORGEJO_TAGS="${FORGEJO_TAGS},${FORGEJO_SERVICE_BASE_IMAGE}:node-${NPM_TAG}"
          if [ "${NPM_TAG}" = "latest" ]; then
            DOCKERHUB_TAGS="${DOCKERHUB_TAGS},betterweb/service-base:node"
            FORGEJO_TAGS="${FORGEJO_TAGS},${FORGEJO_SERVICE_BASE_IMAGE}:node"
          fi
          echo "dockerhub_tags=${DOCKERHUB_TAGS}" >> "$GITHUB_OUTPUT"
          echo "forgejo_tags=${FORGEJO_TAGS}" >> "$GITHUB_OUTPUT"

      - name: Login to Forgejo
        uses: docker/login-action@v3
        with:
          registry: ${{ env.FORGEJO_REGISTRY }}
          username: ${{ secrets.BC_CODE_USER }}
          password: ${{ secrets.BC_CODE_PACKAGE_TOKEN }}

      - name: Build and push to Forgejo
        uses: docker/build-push-action@v6
        with:
          build-args: |
            NODE_BASE_IMAGE=${{ env.FORGEJO_NODE_BASE_IMAGE }}
            BSB_VERSION=${{ needs.prepare.outputs.version }}
            BSB_BUNDLED_PLUGINS=@bsb/config-vault@${{ needs.prepare.outputs.version }}
          context: .
          file: ./nodejs/Dockerfile
          platforms: ${{ steps.upstream.outputs.platforms }}
          push: true
          tags: ${{ steps.tags.outputs.forgejo_tags }}

      - name: Login to DockerHub
        continue-on-error: true
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Check Docker Hub quota
        continue-on-error: true
        env:
          DOCKER_HUB_USER: ${{ secrets.DOCKER_HUB_USER }}
          DOCKER_HUB_TOKEN: ${{ secrets.DOCKER_HUB_TOKEN }}
        run: bash .github/scripts/check-dockerhub-rate-limit.sh betterweb/node:26

      - name: Build and push to DockerHub
        continue-on-error: true
        uses: docker/build-push-action@v6
        with:
          build-args: |
            NODE_BASE_IMAGE=${{ env.FORGEJO_NODE_BASE_IMAGE }}
            BSB_VERSION=${{ needs.prepare.outputs.version }}
            BSB_BUNDLED_PLUGINS=@bsb/config-vault@${{ needs.prepare.outputs.version }}
          context: .
          file: ./nodejs/Dockerfile
          platforms: ${{ steps.upstream.outputs.platforms }}
          push: true
          tags: ${{ steps.tags.outputs.dockerhub_tags }}

  docker-go:
    name: Docker Go
    needs: [go, prepare, docker-nodejs]
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Compute tags
        id: tags
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          NPM_TAG="${{ needs.prepare.outputs.npm-tag }}"
          DOCKERHUB_TAGS="betterweb/service-base:go-${VERSION}"
          DOCKERHUB_TAGS="${DOCKERHUB_TAGS},betterweb/service-base:go-${NPM_TAG}"
          FORGEJO_TAGS="${FORGEJO_SERVICE_BASE_IMAGE}:go-${VERSION}"
          FORGEJO_TAGS="${FORGEJO_TAGS},${FORGEJO_SERVICE_BASE_IMAGE}:go-${NPM_TAG}"
          if [ "${NPM_TAG}" = "latest" ]; then
            DOCKERHUB_TAGS="${DOCKERHUB_TAGS},betterweb/service-base:go"
            FORGEJO_TAGS="${FORGEJO_TAGS},${FORGEJO_SERVICE_BASE_IMAGE}:go"
          fi
          echo "dockerhub_tags=${DOCKERHUB_TAGS}" >> "$GITHUB_OUTPUT"
          echo "forgejo_tags=${FORGEJO_TAGS}" >> "$GITHUB_OUTPUT"

      - name: Login to Forgejo
        uses: docker/login-action@v3
        with:
          registry: ${{ env.FORGEJO_REGISTRY }}
          username: ${{ secrets.BC_CODE_USER }}
          password: ${{ secrets.BC_CODE_PACKAGE_TOKEN }}

      - name: Login to DockerHub
        continue-on-error: true
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Check Docker Hub quota
        continue-on-error: true
        env:
          DOCKER_HUB_USER: ${{ secrets.DOCKER_HUB_USER }}
          DOCKER_HUB_TOKEN: ${{ secrets.DOCKER_HUB_TOKEN }}
        run: bash .github/scripts/check-dockerhub-rate-limit.sh golang:1.26-alpine alpine:3.24

      - name: Build and push to Forgejo
        uses: docker/build-push-action@v6
        with:
          context: ./go
          file: ./go/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.forgejo_tags }}

      - name: Build and push to DockerHub
        continue-on-error: true
        uses: docker/build-push-action@v6
        with:
          context: ./go
          file: ./go/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.dockerhub_tags }}

  docker-python:
    name: Docker Python
    needs: [python, prepare, docker-go]
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Compute tags
        id: tags
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          NPM_TAG="${{ needs.prepare.outputs.npm-tag }}"
          DOCKERHUB_TAGS="betterweb/service-base:python-${VERSION}"
          DOCKERHUB_TAGS="${DOCKERHUB_TAGS},betterweb/service-base:python-${NPM_TAG}"
          FORGEJO_TAGS="${FORGEJO_SERVICE_BASE_IMAGE}:python-${VERSION}"
          FORGEJO_TAGS="${FORGEJO_TAGS},${FORGEJO_SERVICE_BASE_IMAGE}:python-${NPM_TAG}"
          if [ "${NPM_TAG}" = "latest" ]; then
            DOCKERHUB_TAGS="${DOCKERHUB_TAGS},betterweb/service-base:python"
            FORGEJO_TAGS="${FORGEJO_TAGS},${FORGEJO_SERVICE_BASE_IMAGE}:python"
          fi
          echo "dockerhub_tags=${DOCKERHUB_TAGS}" >> "$GITHUB_OUTPUT"
          echo "forgejo_tags=${FORGEJO_TAGS}" >> "$GITHUB_OUTPUT"

      - name: Login to Forgejo
        uses: docker/login-action@v3
        with:
          registry: ${{ env.FORGEJO_REGISTRY }}
          username: ${{ secrets.BC_CODE_USER }}
          password: ${{ secrets.BC_CODE_PACKAGE_TOKEN }}

      - name: Login to DockerHub
        continue-on-error: true
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Check Docker Hub quota
        continue-on-error: true
        env:
          DOCKER_HUB_USER: ${{ secrets.DOCKER_HUB_USER }}
          DOCKER_HUB_TOKEN: ${{ secrets.DOCKER_HUB_TOKEN }}
        run: bash .github/scripts/check-dockerhub-rate-limit.sh python:3.14-slim

      - name: Build and push to Forgejo
        uses: docker/build-push-action@v6
        with:
          context: ./python
          file: ./python/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.forgejo_tags }}

      - name: Build and push to DockerHub
        continue-on-error: true
        uses: docker/build-push-action@v6
        with:
          context: ./python
          file: ./python/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.dockerhub_tags }}

  docker-dotnet:
    name: Docker .NET
    needs: [dotnet, prepare, docker-python]
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Compute tags
        id: tags
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          NPM_TAG="${{ needs.prepare.outputs.npm-tag }}"
          DOCKERHUB_TAGS="betterweb/service-base:dotnet-${VERSION}"
          DOCKERHUB_TAGS="${DOCKERHUB_TAGS},betterweb/service-base:dotnet-${NPM_TAG}"
          FORGEJO_TAGS="${FORGEJO_SERVICE_BASE_IMAGE}:dotnet-${VERSION}"
          FORGEJO_TAGS="${FORGEJO_TAGS},${FORGEJO_SERVICE_BASE_IMAGE}:dotnet-${NPM_TAG}"
          if [ "${NPM_TAG}" = "latest" ]; then
            DOCKERHUB_TAGS="${DOCKERHUB_TAGS},betterweb/service-base:dotnet"
            FORGEJO_TAGS="${FORGEJO_TAGS},${FORGEJO_SERVICE_BASE_IMAGE}:dotnet"
          fi
          echo "dockerhub_tags=${DOCKERHUB_TAGS}" >> "$GITHUB_OUTPUT"
          echo "forgejo_tags=${FORGEJO_TAGS}" >> "$GITHUB_OUTPUT"

      - name: Login to Forgejo
        uses: docker/login-action@v3
        with:
          registry: ${{ env.FORGEJO_REGISTRY }}
          username: ${{ secrets.BC_CODE_USER }}
          password: ${{ secrets.BC_CODE_PACKAGE_TOKEN }}

      - name: Login to DockerHub
        continue-on-error: true
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push to Forgejo
        uses: docker/build-push-action@v6
        with:
          context: ./dotnet
          file: ./dotnet/BetterServiceBase/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.forgejo_tags }}

      - name: Build and push to DockerHub
        continue-on-error: true
        uses: docker/build-push-action@v6
        with:
          context: ./dotnet
          file: ./dotnet/BetterServiceBase/Dockerfile
