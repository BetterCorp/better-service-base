name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      npm-tag: ${{ steps.version.outputs.npm-tag }}
    steps:
      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=${TAG}" >> "$GITHUB_OUTPUT"
          if [[ "${TAG}" == *"-"* ]]; then
            PRE="${TAG#*-}"
            PRE="${PRE%%.*}"
            echo "npm-tag=${PRE}" >> "$GITHUB_OUTPUT"
          else
            echo "npm-tag=latest" >> "$GITHUB_OUTPUT"
          fi

  nodejs:
    name: Node.js
    needs: [prepare]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --workspace nodejs

      - name: Test
        run: npm run test --workspace nodejs

      - name: Set version
        working-directory: nodejs
        run: npm version ${{ needs.prepare.outputs.version }} --allow-same-version --no-git-tag-version

      - name: Publish to npm
        working-directory: nodejs
        run: npm publish --tag ${{ needs.prepare.outputs.npm-tag }} --access public --provenance

  nodejs-tests:
    name: Node.js Tests Package
    needs: [nodejs, prepare]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build base
        run: npm run build-release --workspace nodejs

      - name: Build
        run: npm run build --workspace tests/nodejs

      - name: Set version
        working-directory: tests/nodejs
        run: npm version ${{ needs.prepare.outputs.version }} --allow-same-version --no-git-tag-version

      - name: Publish to npm
        working-directory: tests/nodejs
        run: npm publish --tag ${{ needs.prepare.outputs.npm-tag }} --access public --provenance

  nodejs-vault-plugin:
    name: Node.js Vault Plugin
    needs: [nodejs, prepare]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Set package version
        run: npm version ${{ needs.prepare.outputs.version }} --workspace plugins/nodejs/config-vault --allow-same-version --no-git-tag-version

      - name: Build base CLI
        run: npm run build-release --workspace nodejs

      - name: Link workspace bins
        run: |
          chmod +x nodejs/lib/cli.js nodejs/lib/scripts/bsb-plugin-cli.js nodejs/lib/scripts/bsb-client-cli.js
          for bin in bsb:lib/cli.js bsb-plugin-cli:lib/scripts/bsb-plugin-cli.js bsb-client-cli:lib/scripts/bsb-client-cli.js; do
            name="${bin%%:*}"
            target="../../nodejs/${bin#*:}"
            ln -sf "$target" "node_modules/.bin/$name"
          done

      - name: Build
        run: npm run build --workspace plugins/nodejs/config-vault

      - name: Publish to npm
        working-directory: plugins/nodejs/config-vault
        run: npm publish --tag ${{ needs.prepare.outputs.npm-tag }} --access public --provenance

  registry-plugins:
    name: Publish BSB Registry Plugins
    needs: [nodejs, nodejs-vault-plugin, prepare]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Build base
        run: npm run build-release --workspace nodejs

      - name: Set version
        working-directory: nodejs
        run: npm version ${{ needs.prepare.outputs.version }} --allow-same-version --no-git-tag-version

      - name: Publish core plugins to BSB registry
        working-directory: nodejs
        env:
          BSB_REGISTRY_TOKEN: ${{ secrets.BSB_REGISTRY_TOKEN }}
        run: npm run publish:client

      - name: Publish workspace plugins to BSB registry
        env:
          BSB_REGISTRY_TOKEN: ${{ secrets.BSB_REGISTRY_TOKEN }}
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          for pkg in plugins/nodejs/*; do
            if [ ! -f "$pkg/package.json" ]; then
              continue
            fi
            echo "Publishing registry metadata for $pkg @ $RELEASE_VERSION"
            npm version "$RELEASE_VERSION" --workspace "$pkg" --allow-same-version --no-git-tag-version
            npm run build --workspace "$pkg"
            npm run publish:client --workspace "$pkg"
          done

  python:
    name: Python
    needs: [prepare]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip build
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: pytest

      - name: Build package
        run: python -m build

  go:
    name: Go
    needs: [prepare]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.1"
          cache-dependency-path: go/go.sum

      - name: Run tests
        run: go test ./...

      - name: Build CLI
        run: go build -o /tmp/bsb ./cmd/bsb

  dotnet:
    name: .NET
    needs: [prepare]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dotnet
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore BSB.sln

      - name: Build
        run: dotnet build BSB.sln --configuration Release --no-restore

  docker-nodejs:
    name: Docker Node.js
    needs: [nodejs, nodejs-vault-plugin, prepare]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Resolve upstream platforms
        id: upstream
        run: |
          MANIFEST=$(curl -fsSL https://github.com/BetterCorp/docker-node/releases/latest/download/manifest.json)
          PLATFORMS=$(echo "$MANIFEST" | jq -r '(.builds[] | select(.major == 24) | .variants.base.platforms | join(",")) // empty')
          if [ -z "$PLATFORMS" ]; then
            PLATFORMS="linux/amd64,linux/arm64"
          fi
          echo "platforms=${PLATFORMS}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Compute tags
        id: tags
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          NPM_TAG="${{ needs.prepare.outputs.npm-tag }}"
          TAGS="betterweb/service-base:node-${VERSION}"
          TAGS="${TAGS},betterweb/service-base:node-${NPM_TAG}"
          if [ "${NPM_TAG}" = "latest" ]; then
            TAGS="${TAGS},betterweb/service-base:node"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          build-args: |
            BSB_VERSION=${{ needs.prepare.outputs.version }}
            BSB_BUNDLED_PLUGINS=@bsb/config-vault@${{ needs.prepare.outputs.version }}
          context: .
          file: ./nodejs/Dockerfile
          platforms: ${{ steps.upstream.outputs.platforms }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}

  docker-go:
    name: Docker Go
    needs: [go, prepare]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Compute tags
        id: tags
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          NPM_TAG="${{ needs.prepare.outputs.npm-tag }}"
          TAGS="betterweb/service-base:go-${VERSION}"
          TAGS="${TAGS},betterweb/service-base:go-${NPM_TAG}"
          if [ "${NPM_TAG}" = "latest" ]; then
            TAGS="${TAGS},betterweb/service-base:go"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./go
          file: ./go/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}

  docker-python:
    name: Docker Python
    needs: [python, prepare]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Compute tags
        id: tags
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          NPM_TAG="${{ needs.prepare.outputs.npm-tag }}"
          TAGS="betterweb/service-base:python-${VERSION}"
          TAGS="${TAGS},betterweb/service-base:python-${NPM_TAG}"
          if [ "${NPM_TAG}" = "latest" ]; then
            TAGS="${TAGS},betterweb/service-base:python"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./python
          file: ./python/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}

  docker-dotnet:
    name: Docker .NET
    needs: [dotnet, prepare]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Compute tags
        id: tags
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          NPM_TAG="${{ needs.prepare.outputs.npm-tag }}"
          TAGS="betterweb/service-base:dotnet-${VERSION}"
          TAGS="${TAGS},betterweb/service-base:dotnet-${NPM_TAG}"
          if [ "${NPM_TAG}" = "latest" ]; then
            TAGS="${TAGS},betterweb/service-base:dotnet"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./dotnet
          file: ./dotnet/BetterServiceBase/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
