name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      npm-tag: ${{ steps.version.outputs.npm-tag }}
    steps:
      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=${TAG}" >> "$GITHUB_OUTPUT"
          if [[ "${TAG}" == *"-"* ]]; then
            PRE="${TAG#*-}"
            PRE="${PRE%%.*}"
            echo "npm-tag=${PRE}" >> "$GITHUB_OUTPUT"
          else
            echo "npm-tag=latest" >> "$GITHUB_OUTPUT"
          fi

  nodejs:
    name: Node.js
    needs: [prepare]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --workspace nodejs

      - name: Test
        run: npm run test --workspace nodejs

      - name: Set version
        working-directory: nodejs
        run: npm version ${{ needs.prepare.outputs.version }} --allow-same-version --no-git-tag-version

      - name: Publish to npm
        working-directory: nodejs
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
          npm publish --tag ${{ needs.prepare.outputs.npm-tag }} --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM2_TOKEN_PUB }}

  python:
    name: Python
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip build
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: pytest

      - name: Build package
        run: python -m build

  go:
    name: Go
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"
          cache-dependency-path: go/go.sum

      - name: Run tests
        run: go test ./...

      - name: Build CLI
        run: go build -o /tmp/bsb ./cmd/bsb

  dotnet:
    name: .NET
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dotnet
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore BSB.sln

      - name: Build
        run: dotnet build BSB.sln --configuration Release --no-restore

  docker-nodejs:
    name: Docker Node.js
    needs: [nodejs, prepare]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute tags
        id: tags
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          NPM_TAG="${{ needs.prepare.outputs.npm-tag }}"
          TAGS="betterweb/service-base:node-${VERSION}"
          TAGS="${TAGS},betterweb/service-base:node-${NPM_TAG}"
          if [ "${NPM_TAG}" = "latest" ]; then
            TAGS="${TAGS},betterweb/service-base:node"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          build-args: |
            BSB_VERSION=${{ needs.prepare.outputs.version }}
          context: .
          file: ./nodejs/Dockerfile
          platforms: linux/amd64,linux/arm/v6,linux/arm/v7,linux/arm64/v8
          push: true
          tags: ${{ steps.tags.outputs.tags }}
