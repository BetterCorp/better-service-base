name: Build

on:
  pull_request:
  push:
    branches:
      - develop
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nodejs:
    name: Node.js workspaces
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check workspace lockfiles
        run: npm run ws:check-lockfiles

      - name: Build Node.js core
        run: npm run build --workspace docs --workspace nodejs

      - name: Link workspace bins
        run: |
          chmod +x nodejs/lib/cli.js nodejs/lib/scripts/bsb-plugin-cli.js nodejs/lib/scripts/bsb-client-cli.js
          for bin in bsb:lib/cli.js bsb-plugin-cli:lib/scripts/bsb-plugin-cli.js bsb-client-cli:lib/scripts/bsb-client-cli.js; do
            name="${bin%%:*}"
            target="../../nodejs/${bin#*:}"
            ln -sf "$target" "node_modules/.bin/$name"
          done

      - name: Build plugin workspaces
        run: |
          for pkg in plugins/nodejs/*/package.json; do
            dir=$(dirname "$pkg")
            npm run build --workspace "$dir" --if-present
          done

      - name: Test Node.js core
        run: npm run test --workspace nodejs

  python:
    name: Python
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: pytest

  go:
    name: Go
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.1"
          cache-dependency-path: go/go.sum

      - name: Run tests
        run: go test ./...

      - name: Build CLI
        run: go build -o /tmp/bsb ./cmd/bsb

  dotnet:
    name: .NET
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dotnet
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore BSB.sln

      - name: Build
        run: dotnet build BSB.sln --configuration Release --no-restore

  docker-nodejs:
    name: Node.js Docker image
    needs: [nodejs]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./nodejs/Dockerfile
          platforms: linux/amd64
          push: false

  docker-go:
    name: Go Docker image
    needs: [go]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ./go
          file: ./go/Dockerfile
          platforms: linux/amd64
          push: false

  docker-python:
    name: Python Docker image
    needs: [python]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ./python
          file: ./python/Dockerfile
          platforms: linux/amd64
          push: false

  docker-dotnet:
    name: .NET Docker image
    needs: [dotnet]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ./dotnet
          file: ./dotnet/BetterServiceBase/Dockerfile
          platforms: linux/amd64
          push: false
